<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8 />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Authentication</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
        {% load static%}
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
    </head>
    <body>
        <main class="warp">

            <section>
                <h2>Đăng ký</h2>
                <form id="register-form">
                    <label> Email <input type="email" id="email" required></label>
                    <label> Password <input type="password" id="password" required></label>
                    <label> Comfirm Password <input type="password" id="password_confirm" required></label>
                    <label>Vai trò
                        <select name="role">
                          <option value="customer">Khách</option>
                          <option value="seller">Người bán</option>
                        </select>
                      </label>
                      <button type="submit">Đăng ký</button>
                    </form>
                  </section>
                  <section>
                    <h2>Đăng nhập</h2>
                    <form id="form-login">
                      <label>Email <input type="email" name="email" required /></label>
                      <label>Mật khẩu <input type="password" name="password" required /></label>
                      <button type="submit">Đăng nhập</button>
                    </form>
                  </section>
                  <section>
                    <h2>GET /api/auth/me/</h2>
                    <button type="button" id="btn-me">Gọi API</button>
                    <pre id="out"></pre>
                  </section>
                </main>
                <script src="{% static 'js/app.js' %}"></script>
              </body>
            </html>
